services:
  postgres:
    image: postgres:16-alpine
    container_name: payflow-postgres
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow123
      POSTGRES_DB: payflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:16-alpine
    container_name: payflow-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: payflow
      PGPASSWORD: payflow123
    entrypoint: >
      sh -c "until pg_isready -h postgres -U payflow; do sleep 1; done &&
             sh /scripts/ensure-dbs.sh"
    volumes:
      - ./docker/postgres/ensure-dbs.sh:/scripts/ensure-dbs.sh

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: payflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: payflow
      RABBITMQ_DEFAULT_PASS: payflow123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: payflow-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: payflow-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: payflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: payflow123
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  user-service:
    build:
      context: .
      dockerfile: docker/user-service/Dockerfile
    container_name: payflow-user-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: payflow
      DB_PASSWORD: payflow123
      DB_NAME: payflow_users
      SERVICE_PORT: "8082"
      SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      JWT_SECRET: payflow-jwt-secret-2026
    ports:
      - "8082:8082"
    depends_on:
      db-init:
        condition: service_completed_successfully

  account-service:
    build:
      context: .
      dockerfile: docker/account-service/Dockerfile
    container_name: payflow-account-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: payflow
      DB_PASSWORD: payflow123
      DB_NAME: payflow_accounts
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: payflow
      RABBITMQ_PASSWORD: payflow123
      SERVICE_PORT: "8080"
      SERVICE_NAME: account-service
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      JWT_SECRET: payflow-jwt-secret-2026
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  transfer-service:
    build:
      context: .
      dockerfile: docker/transfer-service/Dockerfile
    container_name: payflow-transfer-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: payflow
      DB_PASSWORD: payflow123
      DB_NAME: payflow_transfers
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: payflow
      RABBITMQ_PASSWORD: payflow123
      SERVICE_PORT: "8081"
      SERVICE_NAME: transfer-service
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      JWT_SECRET: payflow-jwt-secret-2026
    ports:
      - "8081:8081"
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  gateway:
    image: caddy:2-alpine
    container_name: payflow-gateway
    ports:
      - "80:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - account-service
      - transfer-service

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  grafana_data:
