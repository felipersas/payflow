openapi: 3.1.0
info:
  title: PayFlow User Service
  description: User registration and authentication for PayFlow.
  version: 1.0.0
  contact:
    name: PayFlow

servers:
  - url: /
    description: Current server

paths:
  /auth/register:
    post:
      operationId: register
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: login
      summary: Authenticate and obtain a JWT token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          minLength: 6
          description: User password (minimum 6 characters)
      example:
        email: "user@example.com"
        password: "secret123"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          description: User password
      example:
        email: "user@example.com"
        password: "secret123"

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT bearer token
        user:
          $ref: '#/components/schemas/UserDTO'
      example:
        token: "eyJhbGciOiJIUzI1NiIs..."
        user:
          id: "01923456-7890-7abc-def0-1234567890ab"
          email: "user@example.com"

    UserDTO:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
          description: User unique identifier (UUIDv7)
        email:
          type: string
          format: email
          description: User email address

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ValidationError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        fields:
          type: object
          additionalProperties: true
